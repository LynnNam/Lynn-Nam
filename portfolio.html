<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lynn Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=Noto+Sans+SC:wght@100;200;300&family=Noto+Sans+KR:wght@100;200;300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="portfolio.css">
</head>
<body>
  <div class="portfolio-loading" id="portfolio-loading">正在加载作品集 …</div>

  <div class="portfolio-app" id="portfolio-app" hidden>
    <nav class="portfolio-nav" id="portfolio-nav"></nav>

    <header class="portfolio-hero" id="portfolio-hero"></header>
    <section class="portfolio-hero-archive" id="portfolio-hero-archive" aria-label="Profile archive"></section>

    <main>
      <section class="portfolio-about" id="portfolio-about"></section>
      <section class="portfolio-work" id="portfolio-work"></section>
    </main>

    <footer class="portfolio-footer" id="portfolio-footer"></footer>
  </div>

  <div class="project-modal" id="project-modal" hidden aria-hidden="true">
    <div class="project-modal-backdrop" data-close-modal></div>
    <div class="project-modal-panel" role="dialog" aria-modal="true" aria-labelledby="project-modal-title">
      <button type="button" class="project-modal-close" aria-label="关闭" data-close-modal>&times;</button>
      <header class="project-modal-header">
        <span class="project-modal-tag" id="project-modal-tag"></span>
        <h2 id="project-modal-title"></h2>
        <p id="project-modal-desc"></p>
      </header>
      <div class="project-modal-gallery" id="project-modal-gallery"></div>
    </div>
  </div>

  <script src="portfolio.js"></script>
</body>
</html>
