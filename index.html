<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lynn · 个人主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="nav">
    <a href="#" class="logo">Lynn</a>
    <ul class="nav-links">
      <li><a href="#about">关于</a></li>
      <li><a href="#skills">技能</a></li>
      <li><a href="#contact">联系</a></li>
    </ul>
    <button class="menu-btn" aria-label="菜单" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <header class="hero">
    <p class="hero-greeting">你好，我是</p>
    <h1>Lynn</h1>
    <p class="hero-tagline">欢迎来到我的个人空间</p>
    <a href="#about" class="btn">了解更多</a>
  </header>

  <main>
    <section id="about" class="section">
      <h2>关于我</h2>
      <p class="section-text">
        这里可以放一段简短的自我介绍。比如你的兴趣、正在学习的内容，
        或者你希望访客了解的事情。内容可以随时修改成你自己的文字。
      </p>
    </section>

    <section id="skills" class="section section-alt">
      <h2>技能与兴趣</h2>
      <div class="cards">
        <article class="card">
          <span class="card-icon">✦</span>
          <h3>设计</h3>
          <p>关注简洁美观的界面与用户体验。</p>
        </article>
        <article class="card">
          <span class="card-icon">◇</span>
          <h3>开发</h3>
          <p>用代码把想法变成可用的网页与应用。</p>
        </article>
        <article class="card">
          <span class="card-icon">○</span>
          <h3>学习</h3>
          <p>持续探索新技术，保持好奇心。</p>
        </article>
      </motion>
    </section>

    <section id="contact" class="section">
      <h2>联系我</h2>
      <p class="section-text">有想法或合作？欢迎通过下方方式联系。</p>
      <form class="contact-form" id="contact-form">
        <label>
          <span>姓名</span>
          <input type="text" name="name" placeholder="你的名字" required>
        </label>
        <label>
          <span>邮箱</span>
          <input type="email" name="email" placeholder="your@email.com" required>
        </label>
        <label>
          <span>留言</span>
          <textarea name="message" rows="4" placeholder="想说点什么…" required></textarea>
        </label>
        <button type="submit" class="btn">发送留言</button>
      </form>
      <p class="form-note" id="form-note" hidden>感谢留言！（演示模式，未实际发送）</p>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Lynn. 用心制作。</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
