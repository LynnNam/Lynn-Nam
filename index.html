<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lynn OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@9..40,300;400;500&family=IBM+Plex+Mono:wght@300;400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-loading" id="app-loading" aria-live="polite">正在加载 Lynn OS …</div>
  <div class="app">
    <header class="topbar" id="topbar">
      <div class="brand" id="brand"></div>
      <nav class="topbar-nav" id="sidebar-nav" aria-label="主导航"></nav>
    </header>

    <div class="main-wrap">
      <section class="hero-map" id="hero-map" aria-label="Lynn Nam — Product Designer">
        <div class="hero-map__inner">
          <svg class="hero-map__lines" aria-hidden="true">
            <g id="hero-map-lines-group"></g>
          </svg>

          <div class="hero-map__keywords" id="hero-map-keywords">
            <span class="hero-keyword float-a" id="kw-1" data-x="14" data-y="26">产品设计师</span>
            <span class="hero-keyword float-b" id="kw-2" data-x="38" data-y="16">한국어</span>
            <span class="hero-keyword float-c hero-keyword--md-hide" id="kw-3" data-x="84" data-y="9">woodcarving</span>
            <span class="hero-keyword float-a hero-keyword--md-hide" id="kw-4" data-x="93" data-y="19">高达俱乐部</span>
            <span class="hero-keyword float-b" id="kw-5" data-x="76" data-y="40">机器人</span>
            <span class="hero-keyword float-c hero-keyword--md-hide" id="kw-6" data-x="88" data-y="66">홍익대학교</span>
            <span class="hero-keyword float-a" id="kw-7" data-x="50" data-y="80">延吉</span>
            <span class="hero-keyword float-b" id="kw-8" data-x="20" data-y="70">CMF</span>
            <span class="hero-keyword float-c" id="kw-9" data-x="6" data-y="52">深圳</span>
            <span class="hero-keyword float-a hero-keyword--md-hide" id="kw-10" data-x="9" data-y="36">INFP</span>
          </div>

          <div class="hero-map__center">
            <h1 class="hero-map-title">Lynn Nam</h1>
          </div>
        </div>
      </section>

      <div class="main content page container">
        <header class="welcome" id="welcome"></header>

        <main class="dashboard section-grid">
          <section class="section" id="morning-brief" aria-labelledby="brief-heading"></section>
          <section class="section" id="design-workbench" aria-labelledby="workbench-heading"></section>
          <section class="section" id="today" aria-labelledby="today-heading"></section>
        </main>

        <footer class="footer" id="footer"></footer>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
